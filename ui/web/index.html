<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Core</title>
    <script>
      // Initialize theme before any content loads to prevent flash
      (function () {
        function initializeTheme() {
          try {
            if (window.localStorage) {
              const useSystemTheme = localStorage.getItem('use_system_theme') === 'true';
              const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
              const savedTheme = localStorage.getItem('theme');
              const isDark = useSystemTheme
                ? systemPrefersDark
                : savedTheme
                  ? savedTheme === 'dark'
                  : systemPrefersDark;

              if (isDark) {
                document.documentElement.classList.add('dark');
                document.documentElement.style.colorScheme = 'dark';
              } else {
                document.documentElement.classList.remove('dark');
                document.documentElement.style.colorScheme = 'light';
              }
            } else {
              const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
              if (systemPrefersDark) {
                document.documentElement.classList.add('dark');
                document.documentElement.style.colorScheme = 'dark';
              } else {
                document.documentElement.classList.remove('dark');
                document.documentElement.style.colorScheme = 'light';
              }
            }
          } catch (error) {
            console.warn(
              'Failed to initialize theme from localStorage, using system preference:',
              error
            );
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (systemPrefersDark) {
              document.documentElement.classList.add('dark');
              document.documentElement.style.colorScheme = 'dark';
            }
          }
        }
        initializeTheme();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
